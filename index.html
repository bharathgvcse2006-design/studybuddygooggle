<!DOCTYPE html>
<html lang="en">
<head>
    <base target="_self">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StuddyBuddy AI - AI Companion</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Firebase v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #4F46E5 0%, #10B981 100%);
        }
    </style>
</head>

<body class="min-h-screen bg-gray-50">

<!-- Login Page -->
<div id="login-page" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white rounded-xl shadow-lg overflow-hidden">

        <div class="gradient-bg p-6 text-center">
            <h1 class="text-2xl font-bold text-white">StuddyBuddy AI</h1>
            <p class="text-white opacity-90 mt-1">AI COMPANION</p>
        </div>

        <div class="p-6 space-y-4">

            <!-- Google Login -->
            <button id="google-login"
                class="w-full flex items-center justify-center gap-3 border py-2 rounded-md hover:bg-gray-100">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
                Continue with Google
            </button>

            <div class="text-center text-gray-500">OR</div>

            <!-- Email Login -->
            <form id="login-form" class="space-y-4">
                <input id="email" type="email" placeholder="Email"
                    class="w-full px-3 py-2 border rounded-md" required>

                <input id="password" type="password" placeholder="Password"
                    class="w-full px-3 py-2 border rounded-md" required>

                <button type="submit"
                    class="w-full gradient-bg text-white py-2 rounded-md">
                    Login
                </button>
            </form>

        </div>
    </div>
</div>

<!-- Dashboard -->
<div id="dashboard-page" class="hidden min-h-screen">
    <header class="bg-white shadow-sm p-4 flex justify-between">
        <h1 class="text-xl font-bold">StuddyBuddy AI</h1>
        <button id="logout" class="text-red-500">Logout</button>
    </header>

    <main class="p-6">
        <h2 class="text-lg font-semibold">Welcome to Dashboard</h2>
        <p id="user-info" class="mt-2 text-gray-600"></p>
    </main>
</div>

<script>
    // Firebase Config
    var firebaseConfig = {
        apiKey: "AIzaSyCJ0MaxUCtMyi1ounN8DlLjjR6IYdFjzKg",
        authDomain: "studdybuddy-e50e1.firebaseapp.com",
        projectId: "studdybuddy-e50e1",
        appId: "1:194650360505:web:50166095ff26753b236968"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();

    // Google Login
    document.getElementById("google-login").addEventListener("click", function () {
        var provider = new firebase.auth.GoogleAuthProvider();

        auth.signInWithPopup(provider)
            .then(function (result) {
                console.log("User:", result.user);
            })
            .catch(function (error) {
                alert(error.message);
            });
    });

    // Email Login
    document.getElementById("login-form").addEventListener("submit", function (e) {
        e.preventDefault();

        var email = document.getElementById("email").value;
        var password = document.getElementById("password").value;

        auth.signInWithEmailAndPassword(email, password)
            .catch(function (error) {
                alert(error.message);
            });
    });

    // Auth State Listener
    auth.onAuthStateChanged(function (user) {
        if (user) {
            document.getElementById("login-page").classList.add("hidden");
            document.getElementById("dashboard-page").classList.remove("hidden");

            document.getElementById("user-info").innerText =
                "Logged in as: " + (user.displayName || "User") + " (" + user.email + ")";
        } else {
            document.getElementById("login-page").classList.remove("hidden");
            document.getElementById("dashboard-page").classList.add("hidden");
        }
    });

    // Logout
    document.getElementById("logout").addEventListener("click", function () {
        auth.signOut();
    });
</script>

</body>
</html>
